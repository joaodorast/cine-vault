<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título da aplicação -->
    <title>CineVault | Filmes, Séries e o Mundo do Cinema</title>

    <!-- Descrição do site -->
    <meta
      name="description"
      content="CineVault é uma plataforma para explorar filmes, séries, celebridades e notícias do universo cinematográfico."
    />

    <!-- Autor do projeto -->
    <meta name="author" content="João Dorast" />

    <!-- Open Graph (preview quando compartilhar link) -->
    <meta property="og:title" content="CineVault" />
    <meta
      property="og:description"
      content="Explore filmes, séries, rankings, celebridades e notícias do mundo do cinema."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CineVault" />
    <meta
      name="twitter:description"
      content="Descubra filmes, séries e conteúdos do universo cinematográfico."
    />
    <meta name="twitter:image" content="/preview.png" />
  </head>

  <body>
    <div id="root"></div>

    <!-- Entrada da aplicação React -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
